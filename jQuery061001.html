<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./reset.css">
    <title>Document</title>
    <style>
        /* *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        } */
        .wrap{
            width: 800px;
            height: 400px;
            margin: 50px auto;
            overflow: hidden;
            position: relative;
        }

        .slider{
            display: flex;
            height: 100%;
        }

        .slide{
            width: 800px;
            height: 400px;
            flex-shrink: 0;
        }

        .slide img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        button{
            width: 40px;
            height: 40px;
            padding: 5px;
            background-color: rgba(255,255,255,0.5);
            color: #333;

            position: absolute;
            top:50%;
            transform: translateY(-50%);
            z-index: 10;

            cursor: pointer;
        }

        .prev{
            left:20px;
        }

        .next{
            right:20px;
        }
    </style>
</head>
<body>
    <div class="wrap">

        <div class="slider">
        <!-- 제일 마지막 슬라이드 복제
        <div class="slide">
            <img src="./img/p3.jpg" alt="img3" />
        </div> -->

            <div class="slide">
                <img src="./img/park2.jpg" alt="img1" />
            </div>

            <div class="slide">
                <img src="./img/park3.jpg" alt="img2" />
            </div>

            <div class="slide">
                <img src="./img/park5.jpg" alt="img3" />
            </div>

            <!-- 제일 처음 슬라이드 복제
            <div class="slide">
                <img src="./img/p1.jpg" alt="img1" />
            </div>                    -->
        </div>

        <button class="prev">이전</button>
        <button class="next">다음</button>
    </div>
    <script>
       $(function(){
    const slider = $(".slider")
    let swidth = 800
    let scount = $(".slide").length
    let index = 1
    let slideInterval
    let isClick = false   // 클릭 잠금

    // 첫 슬라이드 복제
    slider.append($(".slide").eq(0).clone())

    // 마지막 슬라이드 복제
    slider.prepend($(".slide").eq(scount-1).clone())

    slider.css("marginLeft", -swidth * index)

    function moveSlide(){

        if(isClick) return

        isClick = true

        slider.stop().animate({
            marginLeft : -swidth * index
        }, 500, function(){

            if(index >= scount + 1){
                index = 1
                slider.css("marginLeft", -swidth * index)
            }

            if(index === 0){
                index = scount
                slider.css("marginLeft", -swidth * index)
            }

            isClick = false
        })
    }

    function autoplay(){
        slideInterval = setInterval(function(){
            index++
            moveSlide()
        }, 3000)
    }

    $(".next").on("click", function(){

        if(isClick) return

        clearInterval(slideInterval)

        index++
        moveSlide()

        autoplay()
    })

    $(".prev").on("click", function(){

        if(isClick) return

        clearInterval(slideInterval)

        index--
        moveSlide()

        autoplay()
    })

    autoplay()
})
    </script>
</body>
</html>
