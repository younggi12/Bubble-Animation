<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #wrap{
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        #toolbar{
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        #toolbar div{
            display: flex;
            align-items: center;            
        }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="toolbar">
            <div>
                <label for="color">선색상</label>
                <input type="color" id="color" value="#000"/>
                
                <label for="size">선굵기</label>
                <input type="number" id="size" value="4" min="1" max="50"/>
            </div>
            
            <div>
                <label for="bgcolor">배경색상</label>
                <input type="color" id="bgcolor" value="#fff"/>

                <button id="clear">clear</button>
                <button id="down">download</button>
            </div>
        </div>

          <canvas></canvas>      
    </div>

    <script>
        const canvas = document.querySelector("canvas")
        const toolbar = document.querySelector("#toolbar")

        canvas.width  = window.innerWidth
        canvas.height = window.innerHeight

        const ctx = canvas.getContext("2d")

        let isDrawing = false


        // canvas 그리기 기본 설정
        ctx.strokeStyle = '#000'
        ctx.lineWidth = 4
        ctx.lineCap = 'round'
        ctx.lineJoin = 'round'


        // 값의 기본 설정
        toolbar.addEventListener("change", (e)=>{
            if(e.target.id === 'color'){
                ctx.strokeStyle = e.target.value
            }

            if(e.target.id === 'size'){
                ctx.lineWidth = e.target.value
            }

            if(e.target.id === 'bgcolor'){
                canvas.style.backgroundColor = e.target.value
            }
        })


        // click 설정 
        toolbar.addEventListener("click", function(e){
            if(e.target.id === 'clear'){
                ctx.clearRect(0, 0, canvas.width, canvas.height)
            }

            if(e.target.id === 'down'){
                let link = document.createElement("a")
                link.download = "draw.png"
                link.href = canvas.toDataURL("image/png")
                link.click()
            }


        // 마우스로 그리기 : mousedown, mousemove, mouseup, 
        canvas.addEventListener("mousedown", function(e){
                isDrawing = true
                ctx.beginPath()
                ctx.moveTo(e.offsetX, e.offsetY)
            })

        canvas.addEventListener("mousemove", function(e){
                if(!isDrawing) return
                ctx.lineTo(e.offsetX, e.offsetY)
                ctx.stroke()
            })

        canvas.addEventListener("mouseup", function(e){
                isDrawing = false
                // ctx.closePath()
            })

        canvas.addEventListener("mouseout", function(e){
                isDrawing = false
                // ctx.closePath()
            })

        })
    </script>
</body>
</html>
